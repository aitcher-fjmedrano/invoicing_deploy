apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoicing-api
  labels:
    app.kubernetes.io/name: invoicing-api
    app.kubernetes.io/part-of: invoicing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: invoicing-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: invoicing-api
        app.kubernetes.io/part-of: invoicing
    spec:
      nodeSelector:
        adquira.io/node-pool: apps
      containers:
        - name: api
          image: acradqdemo.azurecr.io/invoicing-api:0.1.1
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 300m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
