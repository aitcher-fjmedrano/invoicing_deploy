apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoicing-api
  labels:
    app.kubernetes.io/name: invoicing-api
    app.kubernetes.io/part-of: invoicing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: invoicing-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: invoicing-api
        app.kubernetes.io/part-of: invoicing
    spec:
      containers:
        - name: api
          image: CHANGE_ME.azurecr.io/invoicing-api:0.1.0
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
