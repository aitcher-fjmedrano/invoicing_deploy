apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: invoicing-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aitcher-fjmedrano/invoicing_deploy.git
    targetRevision: HEAD
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: invoicing
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
